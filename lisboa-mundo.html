<title>Lisboa → Mundo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; image-rendering: pixelated; }
  #hud {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #0ff;
    font: bold 11px 'Courier New', monospace;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.6;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  #progress {
    position: fixed;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 3px;
    background: #001a1a;
    pointer-events: none;
  }
  #progress-bar {
    height: 100%;
    background: #0ff;
    width: 0%;
    transition: width 0.1s linear;
  }
</style>

<body>

        [140,10],[130,5],[120,10],[110,15],[100,10],[90,8],
        [80,10],[70,20],[60,22],[50,25],[40,38],[33,46],
        [28,53],[24,57],[22,60],[25,65],[28,71]
      ],
      // Australia
      [
        [114,-22],[118,-20],[125,-15],[130,-12],[136,-12],[138,-15],
        [142,-18],[148,-20],[152,-22],[154,-28],[150,-35],[145,-38],
        [138,-35],[130,-32],[120,-28],[114,-26],[114,-22]
      ],
    ],
    landmarks: [
      { lng:-9.1399, lat:38.7169, name:"LISBOA" },
      { lng:-74.006, lat:40.7128, name:"NEW YORK" },
      { lng:139.6917, lat:35.6895, name:"TOKYO" },
      { lng:116.3912, lat:39.9073, name:"BEIJING" },
      { lng:151.2093, lat:-33.8688, name:"SYDNEY" },
      { lng:28.9784, lat:41.0082, name:"ISTANBUL" },
    ],
    center: { lng: 0, lat: 20 }
  }
};

const STAGES = ['lisboa', 'iberia', 'europe', 'world'];
const STAGE_DURATION = 30000; // 30s each
const TRANSITION_DURATION = 3000; // 3s zoom transition

// ─── STATE ──────────────────────────────────────────────────────────────────

let startTime = null;
let t = 0;
let animT = 0;

// ─── GEO UTILS ──────────────────────────────────────────────────────────────

function lerp(a, b, f) { return a + (f - a) * f; }
function lerpV(a, b, f) {
  return {
    minLng: a.minLng + (b.minLng - a.minLng) * f,
    maxLng: a.maxLng + (b.maxLng - a.maxLng) * f,
    minLat: a.minLat + (b.minLat - a.minLat) * f,
    maxLat: a.maxLat + (b.maxLat - a.maxLat) * f,
  };
}

function easeInOut(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

function geoToScreen(lng, lat, bounds, pad) {
  const W = canvas.width, H = canvas.height;
  const mW = W - pad*2, mH = H - pad*2;
  // maintain aspect
  const geoW = bounds.maxLng - bounds.minLng;
  const geoH = bounds.maxLat - bounds.minLat;
  const scaleX = mW / geoW;
  const scaleY = mH / geoH;
  const scale = Math.min(scaleX, scaleY);
  const offX = pad + (mW - geoW * scale) / 2;
  const offY = pad + (mH - geoH * scale) / 2;
  return {
    x: offX + (lng - bounds.minLng) * scale,
    y: offY + (bounds.maxLat - lat) * scale
  };
}

function snapPx(v, ps) { return Math.round(v / ps) * ps; }

// ─── DRAW FUNCTIONS ─────────────────────────────────────────────────────────

function buildPath(outline, bounds, pad, ps) {
  ctx.beginPath();
  outline.forEach((pt, i) => {
    const { x, y } = geoToScreen(pt[0], pt[1], bounds, pad);
    const sx = snapPx(x, ps), sy = snapPx(y, ps);
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  });
  ctx.closePath();
}

function drawMap(mapKey, bounds, alpha, at) {
  const map = MAPS[mapKey];
  const W = canvas.width, H = canvas.height;
  const ps = map.pixelSize;
  const pad = 60;

  ctx.globalAlpha = alpha;

  // Draw each outline region
  map.outlines.forEach(outline => {
    buildPath(outline, bounds, pad, ps);

    // Save for clipping
    ctx.save();
    ctx.clip();

    // Interior fill
    ctx.fillStyle = '#000d0d';
    ctx.fillRect(0, 0, W, H);

    // Scanlines
    for (let sy = 0; sy < H; sy += ps * 2) {
      const a = 0.06 + 0.04 * Math.sin(sy * 0.04 + at);
      ctx.globalAlpha = a * alpha;
      ctx.fillStyle = map.color;
      ctx.fillRect(0, sy, W, ps);
    }
    ctx.globalAlpha = alpha;
    ctx.restore();

    // Border
    buildPath(outline, bounds, pad, ps);
    ctx.strokeStyle = map.color;
    ctx.lineWidth = ps;
    ctx.setLineDash([ps * 2, ps]);
    ctx.lineDashOffset = -at * 10;
    ctx.stroke();
    ctx.setLineDash([]);

    // Glow
    buildPath(outline, bounds, pad, ps);
    ctx.strokeStyle = map.color.replace(')', ',0.2)').replace('rgb', 'rgba');
    ctx.lineWidth = ps * 3;
    ctx.stroke();
  });

  // Landmarks
  map.landmarks.forEach((lm, i) => {
    const { x, y } = geoToScreen(lm.lng, lm.lat, bounds, pad);
    const sx = snapPx(x, ps), sy = snapPx(y, ps);

    // Pulse ring
    const phase = (at * 1.5 + i * 1.1) % (Math.PI * 2);
    const r = snapPx((Math.sin(phase) * 0.5 + 0.5) * 24 + 4, ps);
    const ra = 1 - r / 28;
    ctx.globalAlpha = ra * 0.8 * alpha;
    ctx.strokeStyle = map.accent;
    ctx.lineWidth = ps;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.stroke();

    // Dot
    ctx.globalAlpha = alpha;
    ctx.fillStyle = map.accent;
    ctx.fillRect(sx - ps, sy - ps, ps * 2, ps * 2);

    // Label
    ctx.globalAlpha = (0.5 + 0.5 * Math.sin(at + i)) * alpha;
    ctx.fillStyle = map.accent;
    ctx.font = `bold ${Math.max(8, ps * 1.6)}px 'Courier New'`;
    ctx.fillText(lm.name, sx + ps * 2, sy - ps);
  });

  ctx.globalAlpha = alpha;

  // Center expanding squares
  const center = geoToScreen(map.center.lng, map.center.lat, bounds, pad);
  const cx = snapPx(center.x, ps), cy = snapPx(center.y, ps);
  for (let ring = 0; ring < 3; ring++) {
    const rr = snapPx(((at * 25 + ring * 35) % 90), ps);
    const ra = (1 - rr / 90) * alpha;
    ctx.globalAlpha = ra * 0.5;
    ctx.strokeStyle = map.accent;
    ctx.lineWidth = ps;
    ctx.strokeRect(cx - rr, cy - rr, rr * 2, rr * 2);
  }

  ctx.globalAlpha = alpha;

  // HUD
  ctx.fillStyle = map.color;
  ctx.font = `bold ${Math.max(9, ps * 1.8)}px 'Courier New'`;
  ctx.globalAlpha = 0.7 * alpha;
  ctx.fillText(`> ${map.name}`, ps * 3, ps * 5);
  ctx.globalAlpha = alpha;
}

// ─── BACKGROUND GRID ────────────────────────────────────────────────────────

function drawGrid(color, at) {
  const W = canvas.width, H = canvas.height;
  ctx.globalAlpha = 0.05;
  const gs = 12;
  for (let gx = 0; gx < W; gx += gs * 2) {
    for (let gy = 0; gy < H; gy += gs * 2) {
      const b = (Math.sin(gx * 0.04 + at) + Math.sin(gy * 0.04 + at * 0.7)) * 0.5 + 0.5;
      if (b > 0.6) {
        ctx.fillStyle = color;
        ctx.fillRect(gx, gy, gs - 1, gs - 1);
      }
    }
  }
  ctx.globalAlpha = 1;
}

// ─── MAIN LOOP ──────────────────────────────────────────────────────────────

function draw(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;
  animT += 0.025;

  const W = canvas.width, H = canvas.height;

  // Total cycle = 4 stages * 30s + 4 transitions * 3s = 132s
  const cycleDuration = STAGES.length * STAGE_DURATION;
  const cycleElapsed = elapsed % cycleDuration;

  // Which stage are we in?
  const stageF = cycleElapsed / STAGE_DURATION;
  const currentStageIdx = Math.min(Math.floor(stageF), STAGES.length - 1);
  const nextStageIdx = (currentStageIdx + 1) % STAGES.length;
  const stageProgress = stageF - currentStageIdx; // 0..1 within stage

  // Transition happens in last TRANSITION_DURATION of each stage
  const transitionStart = 1 - TRANSITION_DURATION / STAGE_DURATION;
  const inTransition = stageProgress > transitionStart;
  const transitionF = inTransition
    ? easeInOut((stageProgress - transitionStart) / (1 - transitionStart))
    : 0;

  const currentKey = STAGES[currentStageIdx];
  const nextKey = STAGES[nextStageIdx];
  const currentMap = MAPS[currentKey];
  const nextMap = MAPS[nextKey];

  // Interpolate bounds for smooth zoom
  const bounds = lerpV(currentMap.bounds, nextMap.bounds, transitionF);

  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Grid
  const gridColor = inTransition
    ? nextMap.color
    : currentMap.color;
  drawGrid(gridColor, animT);

  // Draw current map fading out
  if (transitionF < 1) {
    drawMap(currentKey, bounds, 1 - transitionF * 0.8, animT);
  }

  // Draw next map fading in
  if (transitionF > 0) {
    drawMap(nextKey, bounds, transitionF, animT);
  }

  if (!inTransition) {
    drawMap(currentKey, currentMap.bounds, 1, animT);
  }

  // HUD label
  hud.textContent = inTransition
    ? `${currentMap.name} → ${nextMap.name}`
    : currentMap.name;

  // Progress bar (within current stage)
  progressBar.style.width = `${stageProgress * 100}%`;

  // Blinking cursor
  if (Math.floor(animT * 2) % 2 === 0) {
    ctx.fillStyle = currentMap.color;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(18, 28, currentMap.pixelSize * 5, currentMap.pixelSize * 1.5);
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
