<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — Onofriana</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="svg/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0A0A0A;
      --paper: #F5F1EA;
      --stone: #6B6560;
      --rose: #A8201A;
      --rule: #D9D1C3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .box { max-width: 32rem; }
    .num {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(5rem, 12vw, 9rem);
      line-height: 1;
      color: var(--rose);
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(1.5rem, 3vw, 2.25rem);
      margin: 0 0 1.5rem;
      line-height: 1.2;
    }
    p {
      color: var(--stone);
      font-size: 1.125rem;
      line-height: 1.6;
      margin: 0 0 2.5rem;
    }
    a {
      display: inline-block;
      font-family: 'Playfair Display', serif;
      font-size: 0.8125rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--rule);
      transition: color 0.3s, border-color 0.3s;
    }
    a:hover { color: var(--rose); border-color: var(--rose); }
    .quote {
      font-style: italic;
      font-family: 'Playfair Display', serif;
      color: var(--stone);
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--rule);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="num">404</div>
    <h1>Esta página ficou no silêncio.</h1>
    <p>O endereço que procura não foi encontrado. Talvez tenha sido mudado de lugar, ou nunca tenha existido.</p>
    <a href="/">Voltar ao início</a>
    <p class="quote">A tradição não existe sem um sentido.</p>
  </div>
</body>
</html>
