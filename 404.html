<style>
:root {
  --preto:       #080507;
  --vinho:       #6b1020;
  --vinho-claro: #a8384a;
  --branco:      #f5f2f0;
  --cinza:       #7a7070;
  --borda:       rgba(107,16,32,0.28);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--preto);
  color: var(--branco);
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  text-align: center;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;

  pointer-events: none;
  z-index: 0;
  opacity: 0.18;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 560px;
  width: 100%;
}

.logo {
  font-family: 'Petit Formal Script', cursive;
  font-size: clamp(2.8rem, 8vw, 4.5rem);
  color: var(--branco);
  text-decoration: none;
  display: block;
  margin-bottom: 48px;
  text-shadow: 0 0 80px rgba(107,16,32,0.3);
}

.ornament {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.52rem;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: var(--vinho-claro);
  opacity: 0.7;
  margin-bottom: 28px;
}

.numero {
  font-size: clamp(5rem, 18vw, 10rem);
  font-weight: 300;
  color: var(--vinho);
  opacity: 0.15;
  line-height: 1;
  margin-bottom: 32px;
  font-style: italic;
}

.titulo {
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 300;
  color: var(--branco);
  margin-bottom: 20px;
  line-height: 1.3;
}
.titulo em {
  font-style: italic;
  color: rgba(245,242,240,0.65);
}

.linha {
  width: 40px;
  height: 1px;
  background: var(--vinho);
  margin: 28px auto;
  opacity: 0.7;
}

.texto {
  font-size: 1.05rem;
  line-height: 1.95;
  color: rgba(245,242,240,0.72);
  margin-bottom: 44px;
}

.btn {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.6rem;
  font-weight: 300;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--branco);
  border: 1px solid rgba(245,242,240,0.28);
  padding: 15px 44px;
  text-decoration: none;
  transition: all 0.4s;
  display: inline-block;
  margin-bottom: 64px;
}
.btn:hover {
  background: rgba(107,16,32,0.18);
  border-color: var(--vinho-claro);
  letter-spacing: 0.5em;
}

/* Contactos */
.contacto-bloco {
  border-top: 1px solid var(--borda);
  padding-top: 48px;
  margin-top: 8px;
}

.contacto-label {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.52rem;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: var(--vinho-claro);
  opacity: 0.65;
  margin-bottom: 18px;
}

.contacto-email {
  font-size: 1.1rem;
  margin-bottom: 36px;
}
.contacto-email a {
  color: var(--branco);
  text-decoration: none;
  transition: color 0.3s;
}
.contacto-email a:hover { color: var(--vinho-claro); }

/* Redes sociais */
.social-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 36px;
}

.social-link {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 14px;
  border: 1px solid rgba(107,16,32,0.45);
  text-decoration: none;
  transition: all 0.35s;
  color: rgba(245,242,240,0.6);
}
.social-link:hover {
  border-color: var(--vinho-claro);
  color: var(--branco);
  background: rgba(107,16,32,0.1);
}
.social-link svg {
  width: 13px; height: 13px;
  fill: currentColor;
  flex-shrink: 0;
}
.social-link-label {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.5rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

/* Spotify */
.spotify-player {
  margin-top: 8px;
}
.spotify-player iframe {
  border-radius: 0;
  border: 1px solid var(--borda);
  display: block;
  width: 100%;
}

/* Rodapé mínimo */
.rodape {
  margin-top: 56px;
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.5rem;
  letter-spacing: 0.18em;
  color: var(--cinza);
  opacity: 0.35;
}

@media (max-width: 480px) {
  .social-link-label { display: none; }
  .social-link { padding: 9px; }
}
</style>
